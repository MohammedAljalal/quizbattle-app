name: quizbattle
description: A gamified asynchronous quiz platform for academic environments.
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  provider: ^6.1.0
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.0
  intl: ^0.19.0
  uuid: ^4.3.0
  fl_chart: ^0.68.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
